<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <style>
    .bg { fill: #0f172a; }
    .box { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 12; }
    .device { fill: #111827; stroke: #22d3ee; stroke-width: 2; rx: 12; }
    .cloud { fill: #38bdf8; opacity: 0.9; }
    .text { font-family: Inter, Arial, sans-serif; fill: #f8fafc; font-size: 14px; }
    .title { font-size: 20px; fill: #f8fafc; font-weight: bold; }
    .ip { fill: #bef264; font-size: 13px; }
    .line { fill: none; stroke: #22d3ee; stroke-width: 3; marker-end: url(#arrow); }
    .table-box { fill: #111827; stroke: #22d3ee; stroke-width: 2; rx: 12; }
    .table-header { fill: #22d3ee; font-size: 13px; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee" />
    </marker>
  </defs>
  <rect class="bg" width="900" height="520" rx="20" />
  <text x="30" y="32" class="title">NAT example: internal hosts share one public IP</text>

  <g class="device">
    <rect x="40" y="70" width="140" height="80" rx="12" />
    <text x="60" y="100" class="text">Camera</text>
    <text x="60" y="125" class="ip">192.168.0.112</text>
  </g>
  <g class="device">
    <rect x="40" y="170" width="140" height="80" rx="12" />
    <text x="60" y="200" class="text">Server</text>
    <text x="60" y="225" class="ip">192.168.0.125</text>
  </g>
  <g class="device">
    <rect x="40" y="270" width="140" height="80" rx="12" />
    <text x="60" y="300" class="text">Laptop</text>
    <text x="60" y="325" class="ip">192.168.0.129</text>
  </g>
  <g class="device">
    <rect x="40" y="370" width="140" height="80" rx="12" />
    <text x="60" y="400" class="text">Phone</text>
    <text x="60" y="425" class="ip">192.168.0.137</text>
  </g>

  <g class="box">
    <rect x="260" y="190" width="180" height="140" rx="18" />
    <text x="300" y="230" class="text">Router / NAT</text>
    <text x="300" y="255" class="ip">Internal: 192.168.0.1</text>
    <text x="300" y="280" class="ip">External: 212.3.4.5</text>
  </g>

  <g class="cloud">
    <ellipse cx="680" cy="220" rx="100" ry="60" />
    <ellipse cx="630" cy="190" rx="70" ry="40" />
    <ellipse cx="725" cy="190" rx="75" ry="42" />
  </g>
  <text x="620" y="240" class="title" font-size="18">Internet</text>

  <path class="line" d="M180,110 L260,110" />
  <path class="line" d="M180,210 L260,210" />
  <path class="line" d="M180,310 L260,310" />
  <path class="line" d="M180,410 L260,410" />
  <path class="line" d="M440,260 L580,260" />

  <g class="table-box">
    <rect x="520" y="320" width="320" height="160" rx="16" />
    <text x="560" y="355" class="table-header">Internal Network</text>
    <text x="740" y="355" class="table-header">External Network</text>
    <text x="560" y="385" class="ip">192.168.0.129, 15401</text>
    <text x="740" y="385" class="ip">212.3.4.5, 19273</text>
    <text x="560" y="410" class="ip">192.168.0.137, 27912</text>
    <text x="740" y="410" class="ip">212.3.4.5, 32759</text>
    <text x="560" y="435" class="ip">192.168.0.112, 38192</text>
    <text x="740" y="435" class="ip">212.3.4.5, 41251</text>
  </g>
</svg>
